kind = "web"
previewPath = "/"
title = "AutoViva AI"
version = "1.0.0"
id = "artifacts/autoviva"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23013

[services.development]
run = "pnpm --filter @workspace/autoviva run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autoviva", "run", "build" ]
publicDir = "artifacts/autoviva/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23013"
BASE_PATH = "/"
